version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mongodb
    environment:
      REDIS_URL: redis://redis:6379
      MONGODB_URL: mongodb://root:password@mongodb:27017
    volumes:
      - .:/app

volumes:
  redis_data:
  mongo_data:
